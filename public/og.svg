<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="75%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7a8a15" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#3a3c14" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#15151a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Eyebrow -->
  <g font-family="Helvetica, Arial, sans-serif" font-weight="600">
    <text x="80" y="140" fill="#e6ff00" font-size="22" letter-spacing="6">CHAOS MEDIA — AGENCJA VIRALOWA</text>
  </g>

  <!-- Main headline -->
  <g font-family="Impact, Helvetica, Arial, sans-serif" font-weight="900">
    <text x="80" y="300" fill="#f5f5f2" font-size="130" letter-spacing="-4">Tworzymy</text>
    <text x="80" y="430" fill="#e6ff00" font-size="130" letter-spacing="-4" font-style="italic">viralowe</text>
    <text x="80" y="560" fill="#f5f5f2" font-size="130" letter-spacing="-4">treści<tspan fill="#e6ff00">.</tspan></text>
  </g>

  <!-- Bottom-right meta -->
  <g font-family="Helvetica, Arial, sans-serif">
    <text x="1120" y="560" fill="#f5f5f2" font-size="22" font-weight="600" text-anchor="end">chaosmedia.pl</text>
    <text x="1120" y="590" fill="#6b6b75" font-size="16" text-anchor="end">KSW · GROMDA · Fansportu · StrefaMMA</text>
  </g>

  <!-- Acid dot accent (top-left, matches header) -->
  <circle cx="92" cy="100" r="10" fill="#e6ff00"/>
</svg>
